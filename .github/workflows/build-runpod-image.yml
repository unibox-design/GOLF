name: Build Runpod Image

on:
  workflow_dispatch:
    inputs:
      image_tag:
        description: Image tag to publish
        required: true
        default: manual
      runpod_base_image:
        description: Base image for docker/runpod.Dockerfile
        required: true
        default: runpod/pytorch:1.0.2-cu1281-torch280-ubuntu2404
  push:
    branches:
      - main
    paths:
      - ".github/workflows/build-runpod-image.yml"
      - "docker/runpod.Dockerfile"
      - "scripts/**"
      - "config/**"
      - "docs/**"
      - "README.md"
      - "parameter-golf/**"

permissions:
  contents: read
  packages: write

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set image metadata
        id: meta
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "tag=${{ github.event.inputs.image_tag }}" >> "$GITHUB_OUTPUT"
            echo "base=${{ github.event.inputs.runpod_base_image }}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=${GITHUB_SHA}" >> "$GITHUB_OUTPUT"
            echo "base=runpod/pytorch:1.0.2-cu1281-torch280-ubuntu2404" >> "$GITHUB_OUTPUT"
          fi
          echo "image=ghcr.io/${GITHUB_REPOSITORY_OWNER}/golf-runpod" >> "$GITHUB_OUTPUT"

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/runpod.Dockerfile
          push: true
          tags: |
            ${{ steps.meta.outputs.image }}:${{ steps.meta.outputs.tag }}
            ${{ steps.meta.outputs.image }}:latest
          build-args: |
            RUNPOD_BASE_IMAGE=${{ steps.meta.outputs.base }}
